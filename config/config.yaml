paths:
  raw_path: "data/raw/dataset.csv"
  processed_path: "data/processed/processed_data.csv"
  model_path: "models/model.joblib"
  metrics_path: "reports/metrics.json"

preprocessing:
  service_cols:
    - "PhoneService"
    - "MultipleLines"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
  numerical_cols:
    - "SeniorCitizen"
    - "MonthlyCharges"
    - "TotalCharges"
    - "HasFamily"
    - "TotalService"
    - "TotalCharges_log"
  categorical_cols:
    - "gender"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "Contract"
    - "PaperlessBilling"


train_settings:
  test_size: 0.2
  random_state: 42
  target_col: "Churn"


model:
  module: "sklearn.ensemble"
  model_name: "RandomForestClassifier"
  params:
    class_weight: "balanced"
    n_estimators: 100
    max_depth: 5
    min_samples_split: 5
    min_samples_leaf: 2
    max_features: "sqrt"
    random_state: 42


hiperparametre:
  module: "sklearn.model_selection"
  model_name: "GridSearchCV"
  params:
    n_estimators: [100, 200, 300]
    max_depth: [5, 8, 10, 15]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    max_features: ["sqrt"]



metrics:
  - module: "sklearn.metrics"
    name: "classification_report"

  - module: "sklearn.metrics"
    name: "confusion_matrix"

  - module: "sklearn.metrics"
    name: "f1_score"

  - module: "sklearn.metrics"
    name: "average_precision_score"